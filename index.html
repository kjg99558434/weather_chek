<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>써밋클라비온현장 안전 공지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { background-color: #f3f4f6; font-family: 'Pretendard', sans-serif; }</style>
</head>
<body class="flex justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col">
        <div class="bg-blue-900 text-white p-5 text-center">
            <h1 class="text-2xl font-extrabold tracking-tight">써밋클라비온현장</h1>
            <p class="text-blue-200 mt-1 text-sm font-medium">일일 체감온도 공지</p>
            <div class="mt-3 inline-block bg-blue-800 rounded-full px-4 py-1 text-sm font-bold" id="today-date"></div>
        </div>
        <div class="p-5 space-y-6">
            <section>
                <h2 class="text-lg font-bold text-gray-800 border-b-2 border-gray-200 pb-2 mb-3">
                    <i class="fa-solid fa-cloud-sun text-blue-500 mr-2"></i>시간별 기상 예보 (07시~17시)
                </h2>
                <div id="weather-container" class="grid grid-cols-3 gap-2">
                    <div class="col-span-3 text-center text-gray-500 text-sm py-4">데이터 로딩 중...</div>
                </div>
            </section>
            <section>
                <h2 class="text-lg font-bold text-gray-800 border-b-2 border-gray-200 pb-2 mb-3">
                    <i class="fa-solid fa-triangle-exclamation text-orange-500 mr-2"></i>온열질환 위험단계
                </h2>
                <div id="risk-card" class="bg-gray-100 rounded-xl p-4 text-center border-l-4 border-gray-400 shadow-sm">
                    <p class="text-sm text-gray-600 mb-1">기상청 기준 예상 최고 체감온도</p>
                    <p class="text-3xl font-bold text-gray-800 mb-2" id="max-temp">--℃</p>
                    <div class="inline-block px-3 py-1 rounded text-white font-bold bg-gray-400 mb-3" id="risk-badge">분석 중</div>
                    <p class="text-sm font-medium text-gray-700 bg-white p-2 rounded" id="risk-guide">데이터를 기다리는 중입니다.</p>
                </div>
            </section>
            <section>
                <h2 class="text-lg font-bold text-gray-800 border-b-2 border-gray-200 pb-2 mb-3">
                    <i class="fa-solid fa-heart-pulse text-red-500 mr-2"></i>건강상태 확인 안내
                </h2>
                <ul class="space-y-3 text-sm text-gray-700">
                    <li class="flex items-start"><i class="fa-solid fa-check text-green-500 mt-1 mr-2"></i><span><strong>TBM 시 필수 확인:</strong> 고령자, 기저질환자 등 온열질환 민감군 사전 건강상태 파악</span></li>
                    <li class="flex items-start"><i class="fa-solid fa-check text-green-500 mt-1 mr-2"></i><span><strong>작업 중 상시 확인:</strong> 동료 작업자 간 상호 건강상태 수시 체크</span></li>
                    <li class="flex items-start"><i class="fa-solid fa-check text-green-500 mt-1 mr-2"></i><span><strong>이상 발생 시 즉시 조치:</strong> 어지러움, 메스꺼움 발생 시 즉시 보고 및 그늘 휴식</span></li>
                </ul>
            </section>
        </div>
    </div>
    <script>
        // 1. API 키 설정 (본인의 키로 반드시 수정하세요)
        const API_KEY = "본인의_인증키를_여기에_입력하세요";
        const nx = 59;
        const ny = 125;
        
        async function fetchWeather() {
            const now = new Date();
            let baseDate = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
            if (now.getHours() < 5) {
                const yesterday = new Date(now.setDate(now.getDate() - 1));
                baseDate = yesterday.getFullYear() + String(yesterday.getMonth()+1).padStart(2,'0') + String(yesterday.getDate()).padStart(2,'0');
            }
            
            const url = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey=${API_KEY}&pageNo=1&numOfRows=300&dataType=JSON&base_date=${baseDate}&base_time=0500&nx=${nx}&ny=${ny}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.response.header.resultCode !== "00") {
                    throw new Error(data.response.header.resultMsg);
                }
                // (이하 데이터 처리 로직은 이전과 동일)
                processWeather(data.response.body.items.item);
            } catch (err) {
                document.getElementById('weather-container').innerHTML = `<p class="col-span-3 text-red-600 text-xs">에러 발생: ${err.message}</p>`;
            }
        }
        
        function processWeather(items) {
            // ... (기존 로직 동일) ...
        }
        
        fetchWeather();
    </script>
</body>
</html>
