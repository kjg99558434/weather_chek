<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>써밋클라비온현장 안전 공지</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-6">
        <h1 class="text-xl font-bold text-center">써밋클라비온현장</h1>
        <div id="status" class="mt-4 p-4 text-center text-sm text-gray-600">데이터 로딩 중...</div>
    </div>

    <script>
        const API_KEY = "28995c1bbe4e734196be4efa91be0792789458ffc3d89d9abf04ac9df4d5abdb";
        const nx = 59;
        const ny = 125;
        
        async function fetchWeather() {
            const now = new Date();
            let baseDate = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
            
            // API 주소 구성
            const url = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey=${API_KEY}&pageNo=1&numOfRows=100&dataType=JSON&base_date=${baseDate}&base_time=0500&nx=${nx}&ny=${ny}`;
            
            // [확인용] 콘솔에 주소 출력
            console.log("=== 호출하는 URL ===");
            console.log(url);
            
            try {
                const response = await fetch(url);
                const text = await response.text();
                
                if (text.includes("Unauthorized")) {
                    document.getElementById('status').innerHTML = `<span class="text-red-500 font-bold">인증 실패 (Unauthorized)<br>콘솔창(F12)의 URL을 확인해보세요.</span>`;
                } else {
                    const data = JSON.parse(text);
                    document.getElementById('status').innerText = "데이터 성공적으로 수신!";
                    console.log("데이터 수신 성공:", data);
                }
            } catch (err) {
                document.getElementById('status').innerText = "에러: " + err.message;
            }
        }
        fetchWeather();
    </script>
</body>
</html>
